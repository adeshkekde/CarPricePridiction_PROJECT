<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚗 Smart Car Price Predictor</h1>

<form action="/predict" method="post">

<input type="number" name="horsepower" placeholder="Horsepower" required>
<input type="number" name="enginesize" placeholder="Engine Size" required>
<input type="number" name="citympg" placeholder="City MPG" required>
<input type="number" name="highwaympg" placeholder="Highway MPG" required>

<button type="submit">Predict Price</button>

</form>

{% if prediction_text %}
<div class="result">
💰 Estimated Price: {{ prediction_text }}
</div>
{% endif %}

{% if car_suggestions %}
<h2 style="text-align:center;">Recommended Cars</h2>

<div class="cards">
{% for car in car_suggestions %}
    <div class="card">
        <img src="{{ car.img }}">
        <h3>{{ car.name }}</h3>
        <p>{{ car.brand }}</p>
    </div>
{% endfor %}
</div>
{% endif %}

</div>

</body>
</html>
